<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mr. Meow - Cat Profile</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }
    h1 { color: #f8b739; margin-bottom: 1.5rem; }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 2rem;
      max-width: 500px;
      width: 100%;
    }
    .avatar {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #f8b739;
      display: block;
      margin: 0 auto 1.5rem;
      background: #333;
    }
    .field { margin-bottom: 1rem; }
    .field label { display: block; color: #888; margin-bottom: 0.3rem; }
    .field input, .field textarea {
      width: 100%;
      padding: 0.5rem;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 0.95rem;
    }
    .field textarea { height: 60px; resize: vertical; }
    .btn {
      width: 100%;
      padding: 0.7rem;
      background: #f8b739;
      color: #1a1a2e;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .btn:hover { background: #e0a020; }
    .btn.secondary { background: #0f3460; color: #e0e0e0; border: 1px solid #f8b739; }
    .btn.secondary:hover { background: #f8b739; color: #1a1a2e; }
    .status { margin-top: 1rem; padding: 0.8rem; background: #1a1a2e; border-radius: 8px; text-align: center; font-size: 0.9rem; }
    .status.ok { color: #2ecc71; }
    .status.error { color: #e74c3c; }
    .row { display: flex; gap: 0.5rem; }
    .row .btn { flex: 1; }
  </style>
</head>
<body>
  <h1>Mr. Meow Profile</h1>
  <div class="card">
    <img id="avatar" class="avatar" src="" alt="Avatar">
    <div class="field">
      <label>Name</label>
      <input id="name" value="Mr. Meow">
    </div>
    <div class="field">
      <label>Title</label>
      <input id="title" value="Chief Napping Officer">
    </div>
    <div class="field">
      <label>Bio</label>
      <textarea id="bio">Professional window sitter, amateur mouse chaser, full-time snack enthusiast.</textarea>
    </div>
    <div class="field">
      <label>Motto</label>
      <input id="motto" value="If I fits, I sits.">
    </div>
    <div class="field">
      <label>Upload Avatar</label>
      <input type="file" id="fileInput" accept="image/*">
    </div>
    <button class="btn" onclick="save()">Save Profile</button>
    <div class="row" style="margin-top:0.5rem">
      <button class="btn secondary" onclick="load()">Reload</button>
      <button class="btn secondary" onclick="clearForm()">Clear</button>
    </div>
    <div id="status" class="status"></div>
  </div>
  <script>
    const API = 'http://localhost:3000';
    const ID = 'mr-meow-001';
    let avatarB64 = '';
    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        avatarB64 = ev.target.result;
        document.getElementById('avatar').src = avatarB64;
        status('Avatar loaded: ' + file.name, 'ok');
      };
      reader.readAsDataURL(file);
    });
    async function load() {
      status('Loading...', '');
      try {
        const res = await fetch(`${API}/users/${ID}`);
        if (!res.ok) throw new Error('Not found');
        const u = await res.json();
        document.getElementById('name').value = u.name || '';
        document.getElementById('title').value = u.title || '';
        document.getElementById('bio').value = u.bio || '';
        document.getElementById('motto').value = u.motto || '';
        if (u.avatar) {
          avatarB64 = u.avatar;
          document.getElementById('avatar').src = u.avatar;
        }
        status('Profile loaded', 'ok');
      } catch (e) {
        status('Error: ' + e.message, 'error');
      }
    }
    async function save() {
      const body = {
        name: document.getElementById('name').value,
        title: document.getElementById('title').value,
        bio: document.getElementById('bio').value,
        motto: document.getElementById('motto').value,
      };
      if (avatarB64) body.avatar = avatarB64;
      status('Saving...', '');
      try {
        const res = await fetch(`${API}/users/${ID}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        status('Saved!', 'ok');
      } catch (e) {
        status('Error: ' + e.message, 'error');
      }
    }
    function clearForm() {
      document.getElementById('name').value = '';
      document.getElementById('title').value = '';
      document.getElementById('bio').value = '';
      document.getElementById('motto').value = '';
      document.getElementById('avatar').src = '';
      document.getElementById('fileInput').value = '';
      avatarB64 = '';
    }
    function status(msg, cls) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + (cls || '');
    }
    load();
  </script>
</body>
</html>
